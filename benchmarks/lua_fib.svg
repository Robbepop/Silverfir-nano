<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 620 430" width="620" height="430">
  <title>Lua Fibonacci Execution Time — WebAssembly Runtimes</title>
  <defs>
    <linearGradient id="hlGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="620" height="430" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

  <text x="310" y="34" text-anchor="middle" fill="#1f2328" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="600">Lua Fibonacci Time — WebAssembly Runtimes</text>
  <text x="310" y="53" text-anchor="middle" fill="#656d76" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12">lower is better</text>

  <line x1="175" y1="76" x2="175" y2="398" stroke="#d0d7de" stroke-width="1"/>

  <text x="163" y="102" text-anchor="end" fill="#1f2328" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="400">wasmtime (cranelift)</text>
  <rect x="175" y="76" width="102.0" height="42" rx="5" fill="#e05252" opacity="0.82"><animate attributeName="width" from="0" to="102.0" dur="0.40s" fill="freeze"/></rect>
  <text x="267.0" y="102.5" text-anchor="end" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">4.58s</text>

  <rect x="4" y="127" width="612" height="52" rx="6" fill="#f3e8ff" opacity="0.55"/>
  <text x="163" y="158" text-anchor="end" fill="#581c87" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">Silverfir</text>
  <rect x="175" y="132" width="132.1" height="42" rx="5" fill="url(#hlGrad)" filter="url(#glow)"><animate attributeName="width" from="0" to="132.1" dur="0.48s" fill="freeze"/></rect>
  <text x="297.1" y="158.5" text-anchor="end" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">5.93s</text>

  <text x="163" y="214" text-anchor="end" fill="#1f2328" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="400">wasmtime (winch)</text>
  <rect x="175" y="188" width="136.8" height="42" rx="5" fill="#e05252" opacity="0.82"><animate attributeName="width" from="0" to="136.8" dur="0.56s" fill="freeze"/></rect>
  <text x="301.8" y="214.5" text-anchor="end" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">6.14s</text>

  <text x="163" y="270" text-anchor="end" fill="#1f2328" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="400">wasm3</text>
  <rect x="175" y="244" width="221.4" height="42" rx="5" fill="#5b9bd5" opacity="0.75"><animate attributeName="width" from="0" to="221.4" dur="0.64s" fill="freeze"/></rect>
  <text x="386.4" y="270.5" text-anchor="end" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">9.94s</text>

  <text x="163" y="326" text-anchor="end" fill="#1f2328" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="400">WAMR (fast)</text>
  <rect x="175" y="300" width="297.4" height="42" rx="5" fill="#ed7d31" opacity="0.75"><animate attributeName="width" from="0" to="297.4" dur="0.72s" fill="freeze"/></rect>
  <text x="462.4" y="326.5" text-anchor="end" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">13.35s</text>

  <text x="163" y="382" text-anchor="end" fill="#1f2328" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="400">wasmi</text>
  <rect x="175" y="356" width="384.3" height="42" rx="5" fill="#70ad47" opacity="0.75"><animate attributeName="width" from="0" to="384.3" dur="0.80s" fill="freeze"/></rect>
  <text x="549.3" y="382.5" text-anchor="end" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="700">17.25s</text>

</svg>