# Fast Interpreter Handler Definitions
# =====================================
# Single source of truth for handlers and their encodings.
#
# Instruction layout: handler(8B) | imm0(8B) | imm1(8B) | imm2(8B) = 32B
#
# Encoding modes:
#   - (no encoding): Stack-only operation, no immediates
#   - pattern = "name": Reference a shared [[pattern]]
#   - encoding.fields = [...]: Inline field definition
#
# Field bits: 8, 16, 32, 64
# Field kinds: constant (default), slot (needs fixup), target (branch target)
#
# TOS Pattern:
#   - tos_pattern = { pop = N, push = M }: Stack effect, generates D1-D4 variants
#   - tos_pattern = "none": No TOS interaction (control flow, calls, bulk ops)

# =============================================================================
# SHARED PATTERNS
# =============================================================================
# Truly shared patterns that multiple different handlers use.

# Memory load/store share offset+memidx layout
[[pattern]]
name = "load"
fields = [
    { name = "offset", bits = 32 },
    { name = "memidx", bits = 32 },
]

[[pattern]]
name = "store"
fields = [
    { name = "offset", bits = 32 },
    { name = "memidx", bits = 32 },
]

# Global get/set share the same layout
[[pattern]]
name = "global"
fields = [
    { name = "global_idx", bits = 64 },
]

# Ternary operations (memory.fill, memory.copy, table.fill, table.copy)
[[pattern]]
name = "ternary"
fields = [
    { name = "imm0", bits = 64 },
    { name = "imm1", bits = 64 },
]

# Drop operations (elem_drop, data_drop)
[[pattern]]
name = "drop_op"
fields = [
    { name = "idx", bits = 64 },
]

# Type check operations
[[pattern]]
name = "type_check"
fields = [
    { name = "ref_type_low", bits = 64 },
    { name = "ref_type_high", bits = 64 },
]

# Struct new pattern (used by struct_new_default)
[[pattern]]
name = "struct_new"
fields = [
    { name = "typeidx", bits = 64 },
]

# =============================================================================
# VALUE PATTERNS
# =============================================================================

# Constant push to stack
[[pattern]]
name = "const"
fields = [
    { name = "value", bits = 64 },
]

# =============================================================================
# SPECIAL PATTERNS
# =============================================================================

# Raw escape hatch pattern
[[pattern]]
name = "raw"
fields = [
    { name = "imm0", bits = 64 },
    { name = "imm1", bits = 64 },
    { name = "imm2", bits = 64 },
]

# =============================================================================
# TERMINAL / SPECIAL
# =============================================================================

[[handler]]
op = "term"
custom = true
tos_pattern = "none"
dispatch = "nonlinear"

# =============================================================================
# TOS SPILL/FILL (Phase 3 - FP-Based Addressing)
# =============================================================================
# Spill/fill use fp-based addressing to access the operand stack directly.
# operand_base_offset = frame_size * 8 (offset from fp to operand stack start)
# stack_height = current operand stack height (number of values)
#
# The cyclic register assignment depends on stack height:
#   Position P at depth D → register t[(D - P) % 4]
# So we encode both new_depth (TOS count) and depth_variant (height mod 4).
#
# Addressing: operand_base = fp + operand_base_offset
#             slot[i] = operand_base[i]

# Spill: write TOS registers to frame slots
# 4 handlers × 4 variants = 16 generated wrappers
# Variant D1-D4 determined by (height-1)%4, encodes register-to-position mapping
# The tos_pattern { pop = N } passes N position registers based on variant
# Encoding: slot = frame_size + height - 1 (top of operand stack in frame)

[[handler]]
op = "spill_1"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 1, push = 0 }
variants = ["D1", "D2", "D3", "D4"]

[[handler]]
op = "spill_2"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 2, push = 0 }
variants = ["D1", "D2", "D3", "D4"]

[[handler]]
op = "spill_3"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 3, push = 0 }
variants = ["D1", "D2", "D3", "D4"]

[[handler]]
op = "spill_4"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 4, push = 0 }
variants = ["D1", "D2", "D3", "D4"]

# Fill: read frame slots into TOS registers
# 4 handlers × 4 variants = 16 generated wrappers

[[handler]]
op = "fill_1"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 0, push = 1 }
variants = ["D1", "D2", "D3", "D4"]

[[handler]]
op = "fill_2"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 0, push = 2 }
variants = ["D1", "D2", "D3", "D4"]

[[handler]]
op = "fill_3"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 0, push = 3 }
variants = ["D1", "D2", "D3", "D4"]

[[handler]]
op = "fill_4"
c_impl = true
encoding.fields = [{ name = "slot", bits = 16 }]
tos_pattern = { pop = 0, push = 4 }
variants = ["D1", "D2", "D3", "D4"]

